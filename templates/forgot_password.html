{% extends "base/base.html" %}
{% load static %}
{% block title %} Forgot Password {% endblock title %}

{% block cssfiles %}
<style>
  #forgot_container {
    display: grid;
    place-items: center;
    height: 90vh;
    max-width: 600px;
  }


/* .spinner-border {
    width: 10rem;
    height: 10rem;
} */

.preloader_img{
  max-width: 300px;
}

</style>
  
{% endblock cssfiles %}

{% block content %}

<div id="preloader">
  <img src="{% static 'img/loader.gif' %}" alt="" width="20%">
</div>


  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="/">
        <img src="{% static 'img/logo.png' %}" alt="" width="100">
      </a>
    </div>
  </nav>
  <!-- Navbar Ends -->

<div class="container" id="forgot_container">
  <div class="container bg-light" data-aos="fade-up" data-aos-duration="2000">
    <form action="#" method="post" class="p-3 p-md-5" id="forget_password_form">
      {% csrf_token %}
      <h2 class="mb-3 text-center">Forgot Password</h2>
      <div>
        <label for="email" class="form-label fw-bold">Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="Enter Email Address">
      </div>
      <button class="btn btn-dark mt-3 w-100 rounded-0">Forgot Password</button>
      <div class="text-end mt-2">
        <span class="m-0 info">Remember Password?<a href="/" class="ps-1 text-decoration-none text-dark fw-bold">Login</a></span>
      </div>
    </form>
  </div>
</div>
  
{% endblock content %}

{% block jsfiles %}


<script>
  document.addEventListener('DOMContentLoaded', function() {
      const preloader = document.getElementById('preloader');
     
  
      document.getElementById('forget_password_form').addEventListener('submit', function(event) {
          sessionStorage.setItem('preloaderVisible', 'true');
          preloader.style.display = 'flex';
      });
  

      function hidePreloader() {
          preloader.style.display = 'none';
          sessionStorage.removeItem('preloaderVisible');
      }
  

      window.onload = function() {
          if (sessionStorage.getItem('preloaderVisible') === 'false') {
              preloader.style.display = 'flex';
          }
      };
  
      document.addEventListener('filteringComplete', function() {
          hidePreloader();
      });
  });
</script>
  
{% endblock jsfiles %}

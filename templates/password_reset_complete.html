{% extends 'base/base.html' %}
{% load static %}
<!-------->
{% block title %} Password Reset Complete {% endblock title %}

{% block cssfiles %}
<style>
  #forgot_container {
    display: grid;
    place-items: center;
    height: 90vh;
    max-width: 1000px;
  }
</style>
  
{% endblock cssfiles %}
<!--------------------->
{% block content %}

<div id="preloader">
  <img src="{% static 'img/loader.gif' %}" alt="" width="20%">
</div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="/">
        <img src="{% static 'img/logo.svg' %}" alt="" width="100">
      </a>
    </div>
  </nav>
  <!-- Navbar Ends -->

<div class="container access"  id="forgot_container">
    <div class="shadow-sm rounded-3 mx-3 p-3 p-md-5 form_cover bg-white" data-aos="fade-up" data-aos-duration="2000">
        <span class="d-block text-center mb-3"><i class="bi bi-check-circle display-1 text-success"></i></span>
        <p class="text-center"> <i class="fa fa-check-circle text-success" aria-hidden="true"></i> Congratulations!!! Your password has been reset</p>
        <a href="{% url 'signin' %}" class="btn make_bg_one px-4 text-white d-block">Click here to signin</a>
    </div>
</div>

{% endblock content %}
